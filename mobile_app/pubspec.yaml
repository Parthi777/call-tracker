name: salestrack_mobile
description: "SalesTrack — Executive Call Recorder"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  salestrack_shared:
    path: ../shared_models

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure storage
  flutter_secure_storage: ^9.2.0

  # Google Drive
  googleapis: ^14.0.0
  googleapis_auth: ^1.6.0

  # Network
  connectivity_plus: ^6.1.0
  http: ^1.2.0
  intl: ^0.19.0
  path: ^1.9.0
  uuid: ^4.5.0

  # Routing
  go_router: ^15.1.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
